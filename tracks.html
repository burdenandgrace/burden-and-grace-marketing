<style>
  /* ===== Free-track callout ===== */
  .free-track {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 40px;
    background: linear-gradient(135deg, var(--cream) 0%, #FAF4E5 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    padding: 44px 48px;
    margin: 0 0 20px;
    box-shadow: 0 6px 24px rgba(62,43,31,0.06);
  }
  .free-tag {
    display: inline-block;
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 999px;
    padding: 5px 12px;
    margin-bottom: 16px;
  }
  .free-track h2 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500;
    font-size: 34px;
    color: var(--coffee);
    margin: 0 0 10px;
    line-height: 1.1;
  }
  .free-track p {
    font-size: 16px;
    line-height: 1.65;
    color: var(--coffee-soft);
    max-width: 560px;
    margin: 0 0 24px;
  }
  .free-track-visual {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .free-track-dot {
    width: 12px; height: 12px; border-radius: 999px;
    background: var(--gold);
    opacity: 0.85;
  }
  .free-track-dot:nth-child(1) { opacity: 1; }
  .free-track-dot:nth-child(n+6) { opacity: 0.4; }
  /* ===== Compact 4-phase arc ===== */
  .arc-compact {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin: 10px 0 0;
    position: relative;
  }
  .arc-compact::before {
    content: "";
    position: absolute;
    top: 24px;
    left: 12.5%;
    right: 12.5%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5) 15%, rgba(201,168,76,0.5) 85%, transparent);
    z-index: 0;
  }
  .phase-compact {
    position: relative;
    z-index: 1;
    padding: 0 12px;
    text-align: center;
  }
  .phase-compact .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    border-radius: 999px;
    background: var(--cream);
    border: 1.5px solid var(--gold);
    color: var(--gold);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .phase-compact .label {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 17px;
    color: var(--coffee);
    margin: 0;
  }
  .phase-compact .sub {
    font-size: 12px;
    color: var(--coffee-soft);
    margin: 4px 0 0;
    line-height: 1.4;
  }
  /* ===== Track list ===== */
  .track-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    margin-top: 10px;
  }
  .track-card {
    background: var(--cream);
    border: 1px solid rgba(62,43,31,0.1);
    border-radius: 14px;
    padding: 28px 30px;
    text-decoration: none;
    color: inherit;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 20px;
    align-items: start;
  }
  .track-card:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    box-shadow: 0 8px 22px rgba(62,43,31,0.08);
  }
  .track-num {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 40px;
    font-weight: 500;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.02em;
    padding-top: 2px;
  }
  .track-meta {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bronze);
    margin: 0 0 6px;
    font-weight: 500;
  }
  .track-card h3 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500;
    font-size: 23px;
    color: var(--coffee);
    margin: 0 0 10px;
    line-height: 1.2;
  }
  .track-card p {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--coffee-soft);
    margin: 0;
  }
  /* ===== What unlocks section ===== */
  .unlock-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    margin-top: 30px;
  }
  .unlock-item {
    background: var(--cream);
    border: 1px solid rgba(62,43,31,0.08);
    border-radius: 12px;
    padding: 28px 24px;
  }
  .unlock-item .check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: 999px;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-size: 16px;
    margin-bottom: 14px;
  }
  .unlock-item h3 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 19px;
    font-weight: 500;
    color: var(--coffee);
    margin: 0 0 8px;
  }
  .unlock-item p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--coffee-soft);
    margin: 0;
  }
  @media (max-width: 900px) {
    .free-track { grid-template-columns: 1fr; padding: 32px 28px; gap: 24px; }
    .free-track-visual { justify-content: flex-start; }
    .arc-compact { grid-template-columns: repeat(2, 1fr); row-gap: 30px; }
    .arc-compact::before { display: none; }
    .track-list { grid-template-columns: 1fr; }
    .unlock-grid { grid-template-columns: 1fr; gap: 14px; }
  }
  @media (max-width: 600px) {
    .free-track { padding: 28px 22px; }
    .free-track h2 { font-size: 28px; }
    .track-card { grid-template-columns: 52px 1fr; gap: 16px; padding: 24px 22px; }
    .track-num { font-size: 34px; }
  }
</style>
